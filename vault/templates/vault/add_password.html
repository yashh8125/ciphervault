{% extends 'vault/base.html' %}
{% block content %}
<div style="max-width:560px;margin:0 auto;">
  <div class="card">
    <h2 style="margin-bottom:24px;color:#7c6af7;">Add New Password</h2>
    <form method="POST">
      {% csrf_token %}
      <label>Site Name</label>
      <input type="text" name="site_name" placeholder="e.g. GitHub" required/>
      <label>Site URL (optional)</label>
      <input type="text" name="site_url" placeholder="https://github.com"/>
      <label>Username / Email</label>
      <input type="text" name="username" required/>
      <label>Password</label>
      <input type="password" name="password" id="pwd" required oninput="checkStrength(this.value)"/>
      <div id="strength-bar" style="height:6px;border-radius:4px;background:#2a2a4a;margin-bottom:10px;">
        <div id="strength-fill" style="height:100%;border-radius:4px;width:0%;transition:width .3s;"></div>
      </div>
      <div id="strength-label" style="font-size:12px;color:#aaa;margin-bottom:14px;"></div>
      <label>Notes (optional)</label>
      <textarea name="notes" rows="3"></textarea>
      <button type="submit" class="btn btn-primary" style="width:100%;">Save Password</button>
    </form>
  </div>
</div>
<script>
function checkStrength(pwd) {
  let score = 0;
  if(pwd.length >= 8)  score++;
  if(pwd.length >= 12) score++;
  if(/[A-Z]/.test(pwd)) score++;
  if(/[a-z]/.test(pwd)) score++;
  if(/[0-9]/.test(pwd)) score++;
  if(/[^A-Za-z0-9]/.test(pwd)) score++;
  const colors = ['#e74c3c','#e74c3c','#e67e22','#f1c40f','#27ae60','#27ae60','#27ae60'];
  const labels = ['Very Weak','Weak','Fair','Good','Strong','Very Strong','Very Strong'];
  document.getElementById('strength-fill').style.width = ((score/6)*100)+'%';
  document.getElementById('strength-fill').style.background = colors[score];
  document.getElementById('strength-label').innerText = labels[score];
}
</script>
{% endblock %}
